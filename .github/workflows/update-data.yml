name: Update fuel price data

on:
  schedule:
    # 毎週水曜 19:00 JST (= 10:00 UTC)。公表は水曜14時のため余裕を持たせる
    - cron: "0 10 * * 3"
    # 取りこぼし対策で木曜朝にも再実行（データが同じなら差分なしでスキップされる）
    - cron: "0 22 * * 3"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Fetch latest Excel
        run: python scripts/fetch_latest.py

      - name: Build JSON data
        run: python scripts/build_data.py data/s5_latest.xlsx

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/meta.json data/history
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "data: weekly price update"
            git push
          fi
